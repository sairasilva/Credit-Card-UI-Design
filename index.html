<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Credit Card UI Design</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="container">
        <header>
            <span class="logo">
                <img src="img/logo.png" alt="logo" class="logo">
                <h5>Master Card</h5>

            </span>
            <img src="img/chip.png" alt="chip" class="chip">

        </header>

        <div class="card-details">
            <div class="number-name">
                <h6>Número do Cartão</h6>
                <h5 class="number">4090 1049 2855 3050</h5>
                <h5 class="name">Victória Rocha</h5>
            </div>
            <div class="valid-date">
                <h6>Validade</h6>
                <h5>06/30</h5>
            </div>
        </div>
    </div>
</body>

</html
